<svg width="1280" height="420" viewBox="0 0 1280 420" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">STIGPilot banner</title>
  <desc id="desc">A professional security operations banner for STIGPilot with a compass mark, control nodes, report cards, and workflow labels.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1280" y2="420" gradientUnits="userSpaceOnUse">
      <stop stop-color="#0B1220"/>
      <stop offset="0.58" stop-color="#111827"/>
      <stop offset="1" stop-color="#0F2A36"/>
    </linearGradient>
    <linearGradient id="accent" x1="96" y1="80" x2="286" y2="286" gradientUnits="userSpaceOnUse">
      <stop stop-color="#38BDF8"/>
      <stop offset="1" stop-color="#22C55E"/>
    </linearGradient>
    <filter id="cardShadow" x="-18%" y="-18%" width="136%" height="136%">
      <feDropShadow dx="0" dy="16" stdDeviation="16" flood-color="#020617" flood-opacity="0.34"/>
    </filter>
    <pattern id="grid" width="44" height="44" patternUnits="userSpaceOnUse">
      <path d="M44 0H0V44" stroke="#94A3B8" stroke-opacity="0.075" stroke-width="1"/>
    </pattern>
  </defs>

  <rect width="1280" height="420" rx="30" fill="url(#bg)"/>
