      <rect x="327" y="0" width="84" height="34" rx="17" fill="#64748B" fill-opacity="0.18" stroke="#94A3B8" stroke-opacity="0.45"/>
      <text x="348" y="23" fill="#E2E8F0">Backlog</text>
      <rect x="425" y="0" width="58" height="34" rx="17" fill="#0EA5E9" fill-opacity="0.16" stroke="#38BDF8" stroke-opacity="0.55"/>
