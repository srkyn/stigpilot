    <path d="M126 34C175.706 34 216 74.294 216 124C216 173.706 175.706 214 126 214C76.2944 214 36 173.706 36 124C36 74.294 76.2944 34 126 34Z" stroke="url(#accent)" stroke-width="10"/>
